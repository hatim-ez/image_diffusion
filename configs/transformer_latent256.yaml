dataset:
  shards_path: "data/webdataset/shards/{000000..000999}.tar"
  tokenizer_path: "tokenizer/tokenizer.model"
  image_size: 64
  num_workers: 4
  batch_size: 2
  shuffle_buffer: 2048
  latent_mode: true
  caption_dropout: 0.1

model:
  architecture: "transformer"
  latent_dim: 4
  text_context_tokens: 77
  clip_model: "openai/clip-vit-large-patch14"
  vae_model: "runwayml/stable-diffusion-v1-5"
  text_encoder:
    depth: 6
    heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
  transformer:
    embed_dim: 768
    depth: 16
    heads: 12
    mlp_ratio: 4.0
    patch_size: 2
    context_dim: 768
    image_size: 64

diffusion:
  schedule: "cosine"
  timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  sampler: "ddim"
  ddim_steps: 30

optimizer:
  name: "adamw"
  lr: 0.0001
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1e-08

scheduler:
  name: "cosine"
  warmup_ratio: 0.1
  total_steps: 80000

training:
  max_steps: 80000
  grad_clip: 1.0
  ema_decay: 0.999
  eval_interval: 2000
  checkpoint_interval: 5000
  output_dir: "checkpoints"
  log_dir: "logs"
  validation_prompts: "configs/validation_prompts.txt"
  mixed_precision: "fp16"
  seed: 42
  guidance_scale: 5.0
  eval_batch_size: 2
